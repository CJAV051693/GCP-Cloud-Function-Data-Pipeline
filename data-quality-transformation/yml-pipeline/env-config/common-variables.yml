##################################################################################################
# This file is a template for variables being used inside pipeline independent of the environment
##################################################################################################
parameters:
- name: action
  default: ''

variables:
 
  TF_CF_MODULE_VERSION: '3.0.1'
  TF_CS_MODULE_VERSION: '3.0.0'
  TF_PUBSUBMODULE_VERSION: '2.0.1'
  TF_STORAGEMODULE_VERSION: '3.0.0'
