  TF_CF_MODULE_SOURCE: 'acnciotfregistry.accenture.com/accenture-cio/functiongen2/google'
  TF_CS_MODULE_SOURCE: 'acnciotfregistry.accenture.com/accenture-cio/cloudscheduler/google'
